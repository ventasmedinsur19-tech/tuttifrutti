<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tutti Frutti Pro | MedinSur Dev</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #6200ee; --secondary: #03dac6; --danger: #b00020; }
        body { background: #f4f7f6; font-family: 'Segoe UI', Roboto, sans-serif; color: #333; }
        
        /* Contenedor Principal */
        .app-container { max-width: 500px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .card-pro { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); border: none; }
        
        /* Inputs Estilizados */
        label { font-weight: 600; font-size: 0.85rem; color: #666; margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        .form-control { border-radius: 12px; padding: 12px; border: 2px solid #eee; margin-bottom: 15px; transition: all 0.3s; }
        .form-control:focus { border-color: var(--primary); box-shadow: none; }
        
        /* Juego */
        .letra-circle { width: 80px; height: 80px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; margin: 0 auto 20px; box-shadow: 0 4px 15px rgba(98, 0, 238, 0.4); }
        .btn-basta { background: var(--danger); color: white; border: none; border-radius: 16px; padding: 20px; font-size: 1.5rem; font-weight: 800; width: 100%; text-transform: uppercase; letter-spacing: 2px; transition: transform 0.1s; margin-top: 10px; }
        .btn-basta:active { transform: scale(0.95); }
        .btn-basta:disabled { background: #ccc; }

        .header-game { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .badge-sala { background: #e0e0e0; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        
        .d-none { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="pantalla-inicio" class="card-pro text-center">
        <h1 class="mb-4" style="font-weight: 800;">Tutti Frutti 🍓</h1>
        <p class="text-muted mb-4">Ingresa tus datos para comenzar</p>
        
        <div class="text-start">
            <label>Tu Apodo</label>
            <input type="text" id="input-nombre" class="form-control" placeholder="Ej: Juan">
            
            <label>Nombre de la Sala</label>
            <input type="text" id="input-sala" class="form-control" placeholder="Ej: FamiliaGomez">
        </div>
        
        <button onclick="entrarAlJuego()" class="btn btn-primary w-100 py-3 mt-3" style="border-radius: 12px; font-weight: bold; background: var(--primary);">
            UNIRSE A LA PARTIDA
        </button>
        <div class="mt-4 small text-muted">MedinSur Dev &copy; 2026</div>
    </div>

    <div id="pantalla-juego" class="card-pro d-none">
        <div class="header-game">
            <span class="badge-sala" id="display-sala">SALA: -</span>
            <span class="text-primary fw-bold" id="display-nombre">-</span>
        </div>

        <div class="text-center">
            <div class="letra-circle" id="letra-actual">?</div>
            <h4 id="status-msg" class="mb-4 text-muted">Esperando al administrador...</h4>
        </div>

        <div id="campos-tutti" class="d-none">
            <div class="row">
                <div class="col-12">
                    <label>Nombres / Apellidos</label>
                    <input type="text" class="form-control field" placeholder="...">
                    
                    <label>Cosas</label>
                    <input type="text" class="form-control field" placeholder="...">
                    
                    <label>Animales</label>
                    <input type="text" class="form-control field" placeholder="...">
                    
                    <label>Frutas / Verduras</label>
                    <input type="text" class="form-control field" placeholder="...">
                    
                    <label>Países / Ciudades</label>
                    <input type="text" class="form-control field" placeholder="...">

                    <label>Puntaje Total</label>
                    <input type="number" class="form-control bg-light fw-bold" id="total-score" value="0" readonly>
                </div>
            </div>
            <button id="btn-basta" onclick="gritarBasta()" class="btn-basta">¡BASTA!</button>
        </div>
        
        <button id="btn-ready" onclick="pedirLetra()" class="btn btn-success w-100 py-3 mt-2" style="border-radius: 12px;">ESTOY LISTO</button>
    </div>

</div>

<script>
    const socket = io();
    let miNombre = "";
    let miSala = "";

    function entrarAlJuego() {
        miNombre = document.getElementById('input-nombre').value;
        miSala = document.getElementById('input-sala').value;
        
        if(miNombre && miSala) {
            socket.emit('join-room', { nombre: miNombre, sala: miSala });
            
            document.getElementById('pantalla-inicio').classList.add('d-none');
            document.getElementById('pantalla-juego').classList.remove('d-none');
            document.getElementById('display-sala').innerText = "SALA: " + miSala.toUpperCase();
            document.getElementById('display-nombre').innerText = miNombre;
        } else {
            alert("Por favor, completa ambos campos.");
        }
    }

    function pedirLetra() {
        socket.emit('empezar-ronda', { sala: miSala });
        document.getElementById('btn-ready').classList.add('d-none');
    }

    function gritarBasta() {
        socket.emit('basta', { nombre: miNombre, sala: miSala });
    }

    // EVENTOS DEL SERVIDOR
    socket.on('ronda-iniciada', (letra) => {
        document.getElementById('letra-actual').innerText = letra;
        document.getElementById('status-msg').innerText = "¡ESCRIBE RÁPIDO!";
        document.getElementById('campos-tutti').classList.remove('d-none');
        document.getElementById('btn-ready').classList.add('d-none');
        
        // Limpiar y habilitar campos
        const fields = document.querySelectorAll('.field');
        fields.forEach(f => { f.value = ""; f.disabled = false; });
        document.getElementById('btn-basta').disabled = false;
    });

    socket.on('stop-game', (data) => {
        const fields = document.querySelectorAll('.field');
        fields.forEach(f => f.disabled = true);
        document.getElementById('btn-basta').disabled = true;
        document.getElementById('status-msg').innerText = "¡FIN! Ganador: " + data.ganador;
        document.getElementById('btn-ready').classList.remove('d-none');
        document.getElementById('btn-ready').innerText = "SIGUIENTE RONDA";
        alert("¡" + data.ganador + " dijo BASTA!");
    });
</script>

</body>
</html>
