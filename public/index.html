<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutti Frutti Pro</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .card-game { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 20px; }
        .btn-basta { width: 100%; padding: 20px; font-weight: bold; font-size: 1.5rem; border-radius: 50px; }
        .letra-display { font-size: 5rem; font-weight: 900; color: #6200ee; }
    </style>
</head>
<body>
    <div class="container">
        <div id="pantalla-inicio" class="card card-game p-4 text-center">
            <h2 class="mb-4">Tutti Frutti 🍓</h2>
            <input type="text" id="input-nombre" class="form-control mb-3" placeholder="Tu Apodo">
            <button onclick="entrar()" class="btn btn-primary w-100">Entrar a la Sala</button>
        </div>

        <div id="pantalla-juego" class="card card-game p-4 d-none">
            <div class="text-center">
                <div id="area-letra" class="mb-3">
                    <span class="letra-display" id="letra-actual">?</span>
                </div>
                <button id="btn-iniciar" onclick="iniciarRonda()" class="btn btn-success mb-3">Empezar Ronda</button>
            </div>
            
            <div id="formularios" class="d-none">
                <div class="mb-3"><label>Nombre</label><input type="text" class="form-control field"></div>
                <div class="mb-3"><label>Cosa/Objeto</label><input type="text" class="form-control field"></div>
                <div class="mb-3"><label>Fruta/Verdura</label><input type="text" class="form-control field"></div>
                <div class="mb-3"><label>Color</label><input type="text" class="form-control field"></div>
                <button onclick="presionarBasta()" class="btn btn-danger btn-basta">¡BASTA PARA MÍ!</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        
        function entrar() {
            const n = document.getElementById('input-nombre').value;
            if(n) {
                socket.emit('unirse', n);
                document.getElementById('pantalla-inicio').classList.add('d-none');
                document.getElementById('pantalla-juego').classList.remove('d-none');
            }
        }

        function iniciarRonda() {
            socket.emit('empezar-ronda');
        }

        function presionarBasta() {
            socket.emit('basta');
        }

        socket.on('ronda-iniciada', (letra) => {
            document.getElementById('letra-actual').innerText = letra;
            document.getElementById('btn-iniciar').classList.add('d-none');
            document.getElementById('formularios').classList.remove('d-none');
            const fields = document.querySelectorAll('.field');
            fields.forEach(f => { f.value = ''; f.disabled = false; });
        });

        socket.on('bloquear-y-recaudar', (data) => {
            alert('¡Basta! El ganador fue: ' + data.ganador);
            const fields = document.querySelectorAll('.field');
            fields.forEach(f => f.disabled = true);
            document.getElementById('btn-iniciar').classList.remove('d-none');
        });
    </script>
</body>
</html>
